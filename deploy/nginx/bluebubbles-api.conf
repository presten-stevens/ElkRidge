# =============================================================================
# BlueBubbles API - nginx Reverse Proxy Configuration
# =============================================================================
#
# Installation:
#   macOS (Homebrew):
#     cp bluebubbles-api.conf /opt/homebrew/etc/nginx/servers/
#     nginx -t && brew services restart nginx
#
#   Linux (apt/systemd):
#     cp bluebubbles-api.conf /etc/nginx/sites-available/bluebubbles-api
#     ln -s /etc/nginx/sites-available/bluebubbles-api /etc/nginx/sites-enabled/
#     nginx -t && sudo systemctl reload nginx
#
# Configuration:
#   1. Replace __DOMAIN__ with your domain (e.g., api.example.com)
#   2. Replace __PORT__ with Express port (default 3000)
#   3. Uncomment ssl_certificate lines after running certbot:
#      sudo certbot --nginx -d __DOMAIN__
#
# =============================================================================

# Rate limiting zone: 10 requests/sec per client IP (backup to app-level limiting)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # SSL certificates (uncomment after certbot setup)
    # ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # Health check endpoint - no rate limiting
    location = /health {
        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:__PORT__;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
